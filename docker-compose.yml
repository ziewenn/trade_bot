services:
  bot:
    build: .
    container_name: polymarket-bot
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data          # Persist SQLite DB
      - ./logs:/app/logs          # Persist log files
      - ./config/.env:/app/config/.env:ro  # Config (read-only)
    environment:
      - HEADLESS=true
      - DASHBOARD_ENABLED=true
      - DASHBOARD_PORT=8080
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
